    <meta name="description" content="FINLIT - Learn finance through your interests" />

    <!-- Security headers via meta (CDN/static host fallback).
         NOTE: X-Frame-Options and CSP 'frame-ancestors' are intentionally NOT
         here — browsers ignore them in <meta> (and log console errors). Set
         those two as real HTTP response headers at your host/CDN instead. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://media.giphy.com https://media0.giphy.com https://media1.giphy.com https://media2.giphy.com https://media3.giphy.com https://media4.giphy.com;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.groq.com http://localhost:3001;
      base-uri 'self';
      form-action 'self';
      object-src 'none';
    " />

    <title>FINLIT - Financial Literacy Made Personal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Jura:wght@300;400;500;600;700&family=Michroma&display=swap" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&family=Archivo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
